<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AR Experience</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- MindAR injects its own video + canvas into <body> at runtime -->

  <!-- ── Screens ── -->
  <div id="permission-screen" class="overlay">
    <div class="card">
      <div class="card-icon">&#10084;</div>
      <h1>AR Heart</h1>
      <p>Point your camera at the <strong>heart marker</strong> image and watch a 3D heart burst into your world.</p>
      <button id="start-btn" class="btn">Enable Camera</button>
    </div>
  </div>

  <div id="loading-screen" class="overlay hidden">
    <div class="card">
      <div class="spinner"></div>
      <p id="loading-msg">Starting AR&hellip;</p>
      <div id="compile-progress" class="progress-wrap hidden">
        <div id="compile-bar" class="progress-bar"></div>
      </div>
    </div>
  </div>

  <div id="error-screen" class="overlay hidden">
    <div class="card">
      <div class="card-icon" style="font-size:2.5rem">&#9888;</div>
      <h2>Something went wrong</h2>
      <p id="error-msg">Camera access is required.</p>
      <button id="retry-btn" class="btn">Try Again</button>
    </div>
  </div>

  <!-- Scanning overlay — shown while waiting for marker to be detected -->
  <div id="scan-overlay" class="hidden">
    <div class="scan-frame">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      <div class="scan-line"></div>
    </div>
    <p class="scan-label">Scan the heart marker</p>
  </div>

  <!-- Drag hint shown after heart appears -->
  <div id="ui-hint" class="hint hidden">Drag to rotate</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js",
        "mindar-image": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"
      }
    }
  </script>

  <script type="module" src="js/main.js"></script>
</body>
</html>
